<nav class="sidebar">
  <a href="/" class="nav-item">
    <div class="logo-icon">
      <i class="fas fa-wallet"></i>
    </div>
    <div class="logo-text">Budget<span>Wise</span></div>
  </a>

  <div class="nav-menu">
    <a
      href="{% url 'dashboard' %}"
      class="nav-item {% if request.path == '/dashboard/' %}active{% endif %}"
    >
      <i class="fas fa-th-large"></i>
      Dashboard
    </a>
    <a
      href="{% url 'transactions' %}"
      class="nav-item {% if request.path == '/transactions/' %}active{% endif %}"
    >
      <i class="fas fa-exchange-alt"></i>
      Transactions
    </a>
    <a
      href="{% url 'budgets' %}"
      class="nav-item {% if request.path == '/budgets/' %}active{% endif %}"
    >
      <i class="fas fa-chart-pie"></i>
      Budgets
    </a>
    <a
      href="{% url 'goals' %}"
      class="nav-item {% if request.path == '/goals/' %}active{% endif %}"
    >
      <i class="fas fa-bullseye"></i>
      Goals
    </a>
    <a
      href="{% url 'reports' %}"
      class="nav-item {% if request.path == '/reports/' %}active{% endif %}"
    >
      <i class="fas fa-chart-line"></i>
      Reports
    </a>
  </div>

  {% if user.is_authenticated %}
  <div class="sidebar-footer">
    <a
      href="{% url 'profile' %}"
      class="user-card"
      style="
        text-decoration: none;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
      "
    >
      <div
        class="user-avatar"
        style="background: var(--secondary); color: white"
      >
        {{ user.username|slice:":2"|upper }}
      </div>
      <div class="user-info">
        <div class="user-name">{{ user.first_name|default:user.username }}</div>
        <div
          class="user-email"
          style="font-size: 0.7rem; color: var(--gray-500)"
        >
          {{ user.email }}
        </div>
      </div>
    </a>

    <form action="{% url 'logout' %}" method="post" style="width: 100%">
      {% csrf_token %}
      <button
        type="submit"
        class="nav-item"
        style="
          width: 100%;
          border: none;
          background: rgba(239, 68, 68, 0.05);
          color: #ef4444;
          justify-content: flex-start;
          cursor: pointer;
          padding: 0.75rem 1rem;
          border-radius: var(--radius);
          font-weight: 600;
        "
      >
        <i class="fas fa-sign-out-alt"></i>
        Logout
      </button>
    </form>
  </div>
  {% endif %}
</nav>
