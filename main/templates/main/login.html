{% extends 'main/base.html' %} {% block content %}
<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-logo">
      <div class="logo-icon">
        <i class="fas fa-wallet"></i>
      </div>
      <div class="logo-text login">Budget<span>Wise</span></div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to manage your finances smartly</p>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-input"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-input"
          placeholder="Enter your password"
          required
        />
      </div>

      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 1.5rem;
        "
      >
        <label
          style="
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
          "
        >
          <input
            type="checkbox"
            style="width: 18px; height: 18px; accent-color: var(--primary)"
          />
          <span style="font-size: 0.875rem; color: var(--gray-600)"
            >Remember me</span
          >
        </label>
        <a
          href="#"
          style="
            font-size: 0.875rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
          "
          >Forgot Password?</a
        >
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        style="width: 100%; justify-content: center; padding: 1rem"
      >
        <i class="fas fa-sign-in-alt"></i>
        Sign In
      </button>
    </form>

    <div class="divider">or continue with</div>

    {% include 'components/social-providers.html' %}

    <p class="auth-footer">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
