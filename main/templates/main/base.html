<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}BudgetWise - Personal Finance{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --secondary: #10b981;
        --secondary-dark: #059669;
        --danger: #ef4444;
        --warning: #f59e0b;
        --success: #22c55e;
        --dark: #0f172a;
        --dark-secondary: #1e293b;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --white: #ffffff;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-md:
          0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg:
          0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --shadow-xl:
          0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        --radius-sm: 0.5rem;
        --radius: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.5rem;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        text-decoration: none;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        background: var(--gray-50);
        color: var(--dark);
        line-height: 1.6;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        background: linear-gradient(
          180deg,
          var(--dark) 0%,
          var(--dark-secondary) 100%
        );
        padding: 2rem 1.5rem;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        transition: var(--transition);
      }

      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem;
        margin-bottom: 2.5rem;
        text-decoration: none;
      }

      .logo-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-light) 100%
        );
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }

      .logo-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: white;
        letter-spacing: -0.5px;
      }

      .logo-text.login,
      .logo-text.sign-up {
        color: var(--primary-dark);
      }

      .logo-text span {
        color: var(--primary-light);
      }

      .nav-menu {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 0.875rem;
        padding: 0.875rem 1rem;
        color: var(--gray-400);
        text-decoration: none;
        border-radius: var(--radius);
        font-weight: 500;
        font-size: 0.9375rem;
        transition: var(--transition);
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      .nav-item.active {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }

      .nav-item i {
        width: 20px;
        text-align: center;
        font-size: 1.125rem;
      }

      .sidebar-footer {
        padding-top: 1.5rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .user-card {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        background: rgba(255, 255, 255, 0.05);
        border-radius: var(--radius);
        cursor: pointer;
        transition: var(--transition);
      }

      .user-card:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--secondary) 0%,
          var(--secondary-dark) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 1rem;
      }

      .user-info {
        flex: 1;
      }

      .user-name {
        color: white;
        font-weight: 600;
        font-size: 0.875rem;
      }

      .user-email {
        color: var(--gray-400);
        font-size: 0.75rem;
      }

      .main-content {
        margin-left: 280px;
        min-height: 100vh;
        padding: 2rem;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .page-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--dark);
        letter-spacing: -0.5px;
      }

      .page-subtitle {
        color: var(--gray-500);
        font-size: 0.9375rem;
        margin-top: 0.25rem;
      }

      .header-actions {
        display: flex;
        gap: 1rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: var(--radius);
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        border: none;
        transition: var(--transition);
        text-decoration: none;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }

      .btn-secondary {
        background: white;
        color: var(--dark);
        border: 1px solid var(--gray-200);
        box-shadow: var(--shadow-sm);
      }

      .btn-secondary:hover {
        background: var(--gray-50);
        border-color: var(--gray-300);
      }

      .btn-icon {
        width: 40px;
        height: 40px;
        padding: 0;
        justify-content: center;
        border-radius: 50%;
      }

      .card {
        background: white;
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        transition: var(--transition);
      }

      .card:hover {
        box-shadow: var(--shadow-lg);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .card-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--dark);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: white;
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        box-shadow: var(--shadow);
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        border-radius: 4px 0 0 4px;
      }

      .stat-card.income::before {
        background: linear-gradient(
          180deg,
          var(--secondary) 0%,
          var(--secondary-dark) 100%
        );
      }

      .stat-card.expense::before {
        background: linear-gradient(180deg, var(--danger) 0%, #dc2626 100%);
      }

      .stat-card.balance::before {
        background: linear-gradient(
          180deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
      }

      .stat-card.goals::before {
        background: linear-gradient(180deg, var(--warning) 0%, #d97706 100%);
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-xl);
      }

      .stat-icon {
        width: 56px;
        height: 56px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }

      .stat-card.income .stat-icon {
        background: rgba(16, 185, 129, 0.1);
        color: var(--secondary);
      }

      .stat-card.expense .stat-icon {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }

      .stat-card.balance .stat-icon {
        background: rgba(99, 102, 241, 0.1);
        color: var(--primary);
      }

      .stat-card.goals .stat-icon {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }

      .stat-content {
        flex: 1;
      }

      .stat-label {
        font-size: 0.8125rem;
        color: var(--gray-500);
        font-weight: 500;
        margin-bottom: 0.25rem;
      }

      .stat-value {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--dark);
        letter-spacing: -0.5px;
      }

      .stat-change {
        font-size: 0.75rem;
        font-weight: 600;
        margin-top: 0.25rem;
      }

      .stat-change.positive {
        color: var(--success);
      }

      .stat-change.negative {
        color: var(--danger);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }

      @media (max-width: 1200px) {
        .grid-3 {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
        }
        .main-content {
          margin-left: 0;
        }
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        padding: 1rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--gray-500);
        border-bottom: 1px solid var(--gray-200);
      }

      td {
        padding: 1rem;
        font-size: 0.875rem;
        border-bottom: 1px solid var(--gray-100);
      }

      tr:hover td {
        background: var(--gray-50);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .badge-success {
        background: rgba(34, 197, 94, 0.1);
        color: var(--success);
      }

      .badge-warning {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warning);
      }

      .badge-danger {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }

      .badge-primary {
        background: rgba(99, 102, 241, 0.1);
        color: var(--primary);
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--gray-200);
        border-radius: 9999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 9999px;
        transition: width 0.5s ease;
      }

      .progress-fill.primary {
        background: linear-gradient(
          90deg,
          var(--primary) 0%,
          var(--primary-light) 100%
        );
      }

      .progress-fill.success {
        background: linear-gradient(90deg, var(--success) 0%, #4ade80 100%);
      }

      .progress-fill.warning {
        background: linear-gradient(90deg, var(--warning) 0%, #fbbf24 100%);
      }

      .progress-fill.danger {
        background: linear-gradient(90deg, var(--danger) 0%, #f87171 100%);
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        font-size: 0.9375rem;
        font-family: inherit;
        transition: var(--transition);
        background: white;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .form-input::placeholder {
        color: var(--gray-400);
      }

      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #0f172a 100%
        );
        padding: 2rem;
        position: relative;
        overflow: hidden;
      }

      .auth-container::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.15) 0%,
          transparent 70%
        );
        top: -200px;
        right: -200px;
      }

      .auth-container::after {
        content: "";
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(16, 185, 129, 0.1) 0%,
          transparent 70%
        );
        bottom: -100px;
        left: -100px;
      }

      .auth-card {
        background: white;
        border-radius: var(--radius-xl);
        padding: 3rem;
        width: 100%;
        max-width: 440px;
        box-shadow: var(--shadow-xl);
        position: relative;
        z-index: 1;
      }

      .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      .auth-title {
        text-align: center;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 0.5rem;
      }

      .auth-subtitle {
        text-align: center;
        color: var(--gray-500);
        font-size: 0.9375rem;
        margin-bottom: 2rem;
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--gray-500);
        font-size: 0.875rem;
      }

      .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: var(--gray-400);
        font-size: 0.8125rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--gray-200);
      }

      .chart-container {
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--gray-50);
        border-radius: var(--radius);
        color: var(--gray-400);
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
      }

      .empty-state-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: var(--gray-100);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--gray-400);
      }

      .empty-state-title {
        font-size: 1.125rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 0.5rem;
      }

      .empty-state-text {
        color: var(--gray-500);
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }

      .notification-bell {
        position: relative;
        cursor: pointer;
      }

      .notification-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 18px;
        height: 18px;
        background: var(--danger);
        color: white;
        font-size: 0.625rem;
        font-weight: 700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease forwards;
      }

      .delay-1 {
        animation-delay: 0.1s;
      }
      .delay-2 {
        animation-delay: 0.2s;
      }
      .delay-3 {
        animation-delay: 0.3s;
      }
      .delay-4 {
        animation-delay: 0.4s;
      }
    </style>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% block content %}{% endblock %} {% block extra_js %}{% endblock %}
  </body>
</html>
